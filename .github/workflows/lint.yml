name: Lint

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install flake8
        run: pip install flake8==7.3.0

      - name: Run flake8
        working-directory: backend
        run: flake8 . --max-line-length=120 --extend-ignore=E501 --exclude=__pycache__,tests

  js-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npx eslint src --ext .js,.jsx --max-warnings 0
