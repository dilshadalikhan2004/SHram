name: Lint

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install flake8
        run: pip install flake8==7.3.0

      - name: Collect changed Python files
        id: py_changed
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            RANGE="origin/${{ github.base_ref }}...${{ github.sha }}"
          else
            RANGE="${{ github.event.before }}...${{ github.sha }}"
          fi
          FILES=$(git diff --name-only --diff-filter=d "$RANGE" -- '*.py' | grep '^backend/' | tr '\n' ' ' || true)
          echo "files=$FILES" >> "$GITHUB_OUTPUT"

      - name: Run flake8
        if: steps.py_changed.outputs.files != ''
        run: flake8 ${{ steps.py_changed.outputs.files }} --max-line-length=120 --extend-ignore=E501 --exclude=__pycache__,tests

      - name: Skip flake8 (no changed Python files)
        if: steps.py_changed.outputs.files == ''
        run: echo "No Python file changes detected."

  js-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Collect changed JS/JSX files
        id: js_changed
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            RANGE="origin/${{ github.base_ref }}...${{ github.sha }}"
          else
            RANGE="${{ github.event.before }}...${{ github.sha }}"
          fi
          FILES=$(git diff --name-only --diff-filter=d "$RANGE" -- '*.js' '*.jsx' | grep '^frontend/src/' | sed 's#^frontend/##' | tr '\n' ' ' || true)
          echo "files=$FILES" >> "$GITHUB_OUTPUT"

      - name: Run ESLint
        if: steps.js_changed.outputs.files != ''
        run: cd frontend && npx eslint ${{ steps.js_changed.outputs.files }} --max-warnings 0

      - name: Skip ESLint (no changed JS/JSX files)
        if: steps.js_changed.outputs.files == ''
        run: echo "No frontend JS/JSX file changes detected."
